schema_version: 1
planning_root: docs/assignments
# sandbox controls where scored eval episodes execute (Decisions D10/D11/D12).
# Omit it (the default) to keep the host macOS temp-dir sandbox — acceptable for
# unscored smoke only. Set mode: container to run each agent phase inside the
# pinned Linux image (build: evals/docker/Dockerfile), which machine-enforces
# filesystem containment and, with network: none, total egress denial. See
# evals/README.md "Containerized scored runs" for what is enforced vs. declared.
# sandbox:
#   mode: container            # host (default) | container
#   image: loopbench-sandbox:node24
#   network: none              # none (enforced) | allowlist (declared; awaits an API key)
#   allowlist:                 # only meaningful for network: allowlist
#     - api.openai.com:443
# skills selects the curated procedural skill layer injected into loop-arm
# ExecPlan phase prompts (SkillsBench, arXiv 2602.12670). max_per_phase caps how
# many skills any one phase receives; omit it (the default) to keep the paper's
# "2-3 short skills optimal" cap of 3. The per-skill ≤60-line budget is a code
# invariant, not configurable. include is the skill-ablation allowlist
# (Decision D18): only the listed slugs may be selected — omit it for the full
# pack, or set [] for the no-skill arm. The list joins the eval run's frozen
# config inputs, so a ±skill A/B pair hashes as two distinct treatments.
# skills:
#   max_per_phase: 3
#   include: [scope-discipline, verify-before-claim]
agent:
  # adapter selects the coding-agent CLI: codex (default) or claude.
  # To drive Claude Code instead, set both keys:
  #   adapter: claude
  #   command: claude
  adapter: codex
  command: codex
  run_timeout_ms: 3600000
  max_output_bytes: 1048576
  model: null
  profile: null
  # reasoning_effort pins the model's reasoning level for every subject run
  # (Decision D3). Codex emits it as `-c model_reasoning_effort="<level>"`
  # (minimal|low|medium|high|xhigh); Claude passes it as `--effort <level>`.
  # Leave unset (or null) to inherit the CLI's ambient default — for Codex,
  # the global ~/.codex/config.toml `model_reasoning_effort`.
  # reasoning_effort: high
  reasoning_effort: null
github:
  repository: ParkerRex/programmers-loop
proof:
  command_timeout_ms: 1800000
  max_output_bytes: 65536
  allowed_command_prefixes:
    - bun run
    - bun test
    - node --test
    - node --import tsx --test
    - git diff
    - git status
