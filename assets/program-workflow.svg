<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Program workflow</title>
  <desc id="desc">A Program turns research into a converged decision packet and immutable planning brief, issues one child ExecPlan, refreshes from verified results, and repeats until no slice remains.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width=".5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="520" rx="16" fill="#020617"/>
  <rect width="1200" height="520" rx="16" fill="url(#grid)"/>
  <circle cx="40" cy="31" r="5" fill="#a78bfa"/>
  <text x="56" y="36" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="17" font-weight="700">Program workflow</text>
  <text x="56" y="54" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="9">middle boundary · discovery · convergence · brief-per-slice learning loop</text>

  <!-- Connections render before components. -->
  <line x1="178" y1="176" x2="220" y2="176" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="372" y1="176" x2="414" y2="176" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="566" y1="176" x2="608" y2="176" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="176" x2="802" y2="176" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="954" y1="176" x2="996" y2="176" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M1072 212V272" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="996" y1="316" x2="954" y2="316" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="802" y1="316" x2="760" y2="316" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M684 280V242Q684 230 696 230H866Q878 230 878 218V212" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="608" y1="316" x2="566" y2="316" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="780" y="258" fill="#a78bfa" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">YES · publish next immutable brief</text>
  <text x="587" y="307" fill="#fbbf24" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">NO</text>

  <!-- Program boundary. -->
  <rect x="22" y="70" width="1156" height="374" rx="12" fill="rgba(76,29,149,.08)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8 4"/>
  <text x="38" y="91" fill="#a78bfa" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700">PROGRAM BOUNDARY · OWNED BY ONE ASSIGNMENT</text>

  <!-- Top row: evidence becomes one immutable brief. -->
  <rect x="42" y="140" width="136" height="72" rx="6" fill="#0f172a"/>
  <rect x="42" y="140" width="136" height="72" rx="6" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="110" y="168" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700" text-anchor="middle">PROGRAM INPUTS</text>
  <text x="110" y="188" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">questions + evidence</text>

  <rect x="220" y="140" width="152" height="72" rx="6" fill="#0f172a"/>
  <rect x="220" y="140" width="152" height="72" rx="6" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="296" y="168" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700" text-anchor="middle">RESEARCH</text>
  <text x="296" y="188" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">independent passes</text>

  <rect x="414" y="140" width="152" height="72" rx="6" fill="#0f172a"/>
  <rect x="414" y="140" width="152" height="72" rx="6" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="490" y="168" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700" text-anchor="middle">NORMALIZE</text>
  <text x="490" y="188" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">conflicts + dependencies</text>

  <rect x="608" y="132" width="152" height="88" rx="6" fill="#0f172a"/>
  <rect x="608" y="132" width="152" height="88" rx="6" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="684" y="160" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700" text-anchor="middle">CONVERGE + SPLIT</text>
  <text x="684" y="181" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">decision packet</text>
  <text x="684" y="198" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">ordered slice recommendation</text>

  <rect x="802" y="132" width="152" height="88" rx="6" fill="#0f172a"/>
  <rect x="802" y="132" width="152" height="88" rx="6" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="878" y="160" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700" text-anchor="middle">IMMUTABLE BRIEF</text>
  <text x="878" y="181" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">planning-brief-N.md</text>
  <text x="878" y="198" fill="#a78bfa" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">one exact revision</text>

  <rect x="996" y="132" width="152" height="88" rx="6" fill="#0f172a"/>
  <rect x="996" y="132" width="152" height="88" rx="6" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1072" y="160" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700" text-anchor="middle">CHILD EXECPLAN</text>
  <text x="1072" y="181" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">brief hash + snapshot</text>
  <text x="1072" y="198" fill="#34d399" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">one bounded slice</text>

  <!-- Bottom row: verified learning closes or refreshes the loop. -->
  <rect x="996" y="280" width="152" height="72" rx="6" fill="#0f172a"/>
  <rect x="996" y="280" width="152" height="72" rx="6" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1072" y="308" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700" text-anchor="middle">VERIFIED RESULT</text>
  <text x="1072" y="328" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">proof + discoveries</text>

  <rect x="802" y="280" width="152" height="72" rx="6" fill="#0f172a"/>
  <rect x="802" y="280" width="152" height="72" rx="6" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="878" y="308" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700" text-anchor="middle">REFRESH PROGRAM</text>
  <text x="878" y="328" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">ledger + risks + next slice</text>

  <rect x="608" y="280" width="152" height="72" rx="6" fill="#0f172a"/>
  <rect x="608" y="280" width="152" height="72" rx="6" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="684" y="308" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700" text-anchor="middle">ANOTHER SLICE?</text>
  <text x="684" y="328" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">evidence decides</text>

  <rect x="414" y="280" width="152" height="72" rx="6" fill="#0f172a"/>
  <rect x="414" y="280" width="152" height="72" rx="6" fill="rgba(120,53,15,.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="490" y="308" fill="#f8fafc" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" font-weight="700" text-anchor="middle">COMPLETE PROGRAM</text>
  <text x="490" y="328" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" text-anchor="middle">return evidence to Assignment</text>

  <!-- Legend outside the boundary. -->
  <text x="360" y="483" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="9">LEGEND</text>
  <rect x="420" y="474" width="14" height="10" rx="2" fill="rgba(8,51,68,.4)" stroke="#22d3ee"/>
  <text x="442" y="483" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="9">evidence</text>
  <rect x="520" y="474" width="14" height="10" rx="2" fill="rgba(76,29,149,.4)" stroke="#a78bfa"/>
  <text x="542" y="483" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="9">Program state</text>
  <rect x="664" y="474" width="14" height="10" rx="2" fill="rgba(6,78,59,.4)" stroke="#34d399"/>
  <text x="686" y="483" fill="#94a3b8" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="9">ExecPlan result</text>
</svg>
